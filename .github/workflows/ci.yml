name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history + tags so hatch-vcs can resolve a version

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"

      - name: Sync (package + dev tools)
        run: uv sync --extra dev

      - name: Lint
        run: uv run ruff check .

      - name: Syntax check (all modules incl. GUI)
        run: uv run python -m compileall -q sunatra build.py publish.py install.py conftest.py

      - name: Tests
        run: uv run pytest -q

      - name: Branding guard (no SunoSync in source)
        shell: bash
        run: |
          # Legacy 'SunoSync' is allowed ONLY in core/app_meta.py (migration keys)
          # and tests/ (which exercise the legacy-dir migration). Anywhere else is a
          # rebrand regression.
          if grep -rin "sunosync" --include="*.py" --include="*.js" --include="*.json" \
               --include="*.html" . | grep -vE "app_meta\.py|tests/"; then
            echo "::error::Found 'SunoSync' outside app_meta.py and tests/ — rebrand regression."
            exit 1
          fi
          echo "Branding guard passed."
