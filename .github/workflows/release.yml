name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: windows-latest, artifact: Sunatra-windows }
          - { os: macos-latest,   artifact: Sunatra-macos }
          - { os: ubuntu-latest,  artifact: Sunatra-linux }
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # tags required for hatch-vcs to stamp the real version

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"

      - name: Install Tk runtime (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y python3-tk

      - name: Sync project (with dev tools)
        run: uv sync --extra dev

      - name: Show resolved version
        run: uv run python -c "import sunatra.core.version as v; print('Building Sunatra', v.__version__)"

      - name: Build deliverables (wheel + standalone)
        run: uv run python build.py

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path dist/Sunatra.exe -DestinationPath ${{ matrix.artifact }}.zip

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: cd dist && zip -r ../${{ matrix.artifact }}.zip Sunatra.app

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: cd dist && zip -r ../${{ matrix.artifact }}.zip Sunatra

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}.zip
          generate_release_notes: true
          fail_on_unmatched_files: true

  # Optional: publish the wheel to PyPI. Enable by setting the repo variable
  # PUBLISH_TO_PYPI = "true" and adding the PYPI_TOKEN secret (or configure a
  # PyPI Trusted Publisher and drop the token).
  publish-pypi:
    name: Publish to PyPI
    if: ${{ vars.PUBLISH_TO_PYPI == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"

      - name: Build wheel + sdist
        run: uv build

      - name: Publish
        run: uv publish
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}
